<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 팬사인회 응모 정리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-50:  #f9fafb;
    --blue-100: #f3f4f6;
    --blue-200: #e5e7eb;
    --blue-400: #9ca3af;
    --blue-500: #6b7280;
    --blue-600: #4b5563;
    --blue-700: #374151;
    --blue-800: #1f2937;
    --ice:      #eef2ff;
    --mint:     #d6f0ee;
    --pink:     #ffe1ec;
    --green:    #d5f2df;
    --text:     #111827;
    --text-sub: #6b7280;
    --shadow:   0 4px 20px rgba(0, 0, 0, 0.07);
    --gc:       #374151;
  }

  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #f4f5f7;
    min-height: 100vh;
    color: var(--text);
    padding: 24px;
  }

  .container { max-width: 1400px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    background: white;
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 22px 28px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    border-left: 5px solid var(--gc);
    transition: border-color .3s;
  }
  .title-wrap { display: flex; flex-direction: column; gap: 6px; }
  .title-top   { display: flex; align-items: center; gap: 10px; }
  .year-badge  {
    background: var(--gc); color: white;
    font-size: 11px; font-weight: 800; letter-spacing: .5px;
    padding: 3px 9px; border-radius: 6px;
    transition: background .3s;
    flex-shrink: 0;
  }
  .title-wrap h1 {
    font-size: 22px; font-weight: 800;
    color: var(--blue-800); letter-spacing: -.5px; line-height: 1.2;
  }
  .title-wrap p  { color: var(--text-sub); font-size: 13px; padding-left: 2px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }

  /* ── Buttons ── */
  .btn {
    border: none; border-radius: 10px; padding: 10px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .18s; display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gc), color-mix(in srgb, var(--gc) 80%, black));
    color: white;
    box-shadow: 0 4px 14px color-mix(in srgb, var(--gc) 40%, transparent);
  }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .btn-ghost  { background: white; color: var(--blue-700); border: 1.5px solid var(--blue-200); }
  .btn-ghost:hover { background: var(--blue-50); border-color: var(--blue-400); }
  .btn-danger { background: #fff; color: #d33a63; border: 1.5px solid #ffc5d5; }
  .btn-danger:hover { background: #fff0f5; }
  .btn-sm     { padding: 6px 10px; font-size: 12px; border-radius: 8px; }

  /* ── Group Nav ── */
  .group-nav {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .group-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 12px; border: 2px solid transparent;
    background: white; color: var(--text-sub);
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all .18s;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    font-family: inherit; position: relative;
  }
  .group-tab:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .group-tab.active { color: white; }
  .group-dot {
    width: 9px; height: 9px; border-radius: 50%;
    flex-shrink: 0;
  }
  .group-actions {
    display: flex; gap: 3px; align-items: center;
    opacity: 0; transition: opacity .15s; flex-shrink: 0;
  }
  .group-tab:hover .group-actions { opacity: 1; }
  .group-tab.active .group-actions { opacity: .8; }
  .group-icon-btn {
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,.15); color: white;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; font-family: inherit; padding: 0;
    transition: background .12s; flex-shrink: 0;
    line-height: 1;
  }
  .group-tab:not(.active) .group-icon-btn { background: rgba(0,0,0,.1); color: var(--text-sub); }
  .group-icon-btn:hover { background: rgba(0,0,0,.28) !important; }
  .group-add-btn {
    padding: 9px 16px; border-radius: 12px;
    border: 2px dashed var(--blue-300);
    background: transparent; color: var(--blue-500);
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all .18s; font-family: inherit;
  }
  .group-add-btn:hover { background: var(--blue-50); border-color: var(--blue-500); }

  /* ── Status Tabs ── */
  .status-nav {
    display: flex; gap: 4px;
    background: white; border-radius: 12px; padding: 4px;
    box-shadow: var(--shadow); margin-bottom: 16px; width: fit-content;
  }
  .status-tab {
    padding: 8px 22px; border-radius: 9px; border: none;
    background: transparent; color: var(--text-sub);
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all .18s; font-family: inherit;
    display: flex; align-items: center; gap: 7px;
  }
  .cnt-badge {
    border-radius: 999px; padding: 1px 8px; font-size: 11px; font-weight: 700;
    background: #eee; color: #666;
    transition: all .18s;
  }
  .status-tab.active {
    color: white;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
  }
  .status-tab.active .cnt-badge {
    background: rgba(255,255,255,.25); color: white;
  }

  /* ── Stats ── */
  .stats-row {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: stretch;
  }
  .stats-group {
    display: flex; gap: 10px; flex: 1;
  }
  .stats-group .stat-card { flex: 1; }
  .stats-sep {
    width: 1.5px; background: var(--blue-200); border-radius: 2px;
    flex-shrink: 0; align-self: stretch; margin: 2px 4px;
  }
  .stat-card {
    background: white; border-radius: 14px; padding: 15px 18px;
    box-shadow: var(--shadow); border-top: 3px solid var(--blue-400);
  }
  .stat-card .lbl { font-size: 12px; color: var(--text-sub); font-weight: 600; }
  .stat-card .val { font-size: 24px; font-weight: 800; color: var(--blue-700); margin-top: 4px; }

  /* ── Filter Bar ── */
  .filter-bar {
    background: white; padding: 14px 18px; border-radius: 14px;
    box-shadow: var(--shadow); margin-bottom: 16px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .filter-bar input, .filter-bar select {
    border: 1.5px solid var(--blue-200); border-radius: 10px;
    padding: 9px 12px; font-size: 13px; font-family: inherit;
    color: var(--text); background: var(--blue-50); outline: none;
    transition: border-color .15s;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--gc); background: white; }
  .filter-bar input { flex: 1; min-width: 180px; }

  /* ── Table ── */
  .table-wrap {
    background: white; border-radius: 16px; box-shadow: var(--shadow);
    overflow: hidden; overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 1100px; }
  thead { background: var(--gc); transition: background .3s; }
  thead th {
    color: white; font-weight: 700; font-size: 13px;
    padding: 14px 10px; text-align: center;
    letter-spacing: -.3px; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--blue-100); transition: background .12s; }
  tbody tr:hover { background: var(--blue-50); }
  tbody td {
    padding: 12px 10px; font-size: 13px;
    text-align: center; color: var(--text); white-space: nowrap;
  }
  tbody td.note {
    white-space: nowrap;
    text-align: left;
    width: 160px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td.note.has-content {
    cursor: pointer;
  }
  tbody td.note.has-content:hover {
    color: var(--gc);
    text-decoration: underline dotted;
  }

  /* 비고 팝업 */
  .note-modal { max-width: 420px; }
  .note-modal h2 { margin-bottom: 14px; }
  .note-body {
    background: var(--blue-50); border-radius: 10px;
    padding: 14px 16px; font-size: 14px; line-height: 1.7;
    color: var(--text); white-space: pre-wrap; word-break: break-word;
  }

  .tag {
    display: inline-block; padding: 4px 10px;
    border-radius: 999px; font-size: 12px; font-weight: 700;
  }
  .tag-영통 { background: var(--pink);  color: #b0335c; }
  .tag-대면 { background: var(--ice);   color: var(--blue-700); }
  .tag-포토 { background: var(--green); color: #1f6b3a; }

  .actions-cell { display: flex; gap: 6px; justify-content: center; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-sub); }
  .empty svg { margin-bottom: 12px; opacity: .45; display: block; margin-left: auto; margin-right: auto; }

  /* ── Modals ── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(17, 24, 39, .35); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: white; border-radius: 18px; padding: 28px;
    width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.15);
  }
  .modal h2 { font-size: 20px; color: var(--blue-800); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; border: 1.5px solid var(--blue-200); border-radius: 9px;
    padding: 9px 12px; font-size: 13px; font-family: inherit;
    color: var(--text); background: var(--blue-50); outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gc); background: white; }
  .field textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

  /* Color swatches */
  .color-section { margin-top: 6px; }
  .color-section-label {
    font-size: 11px; font-weight: 700; color: var(--text-sub);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px;
  }
  .color-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 10px; }
  .cswatch {
    width: 28px; height: 28px; border-radius: 7px; cursor: pointer;
    border: 3px solid transparent; transition: all .15s;
    flex-shrink: 0;
  }
  .cswatch:hover { transform: scale(1.15); }
  .cswatch.sel { border-color: #0f2545; transform: scale(1.1); box-shadow: 0 0 0 1px #0f2545; }

  /* Confirm dialogs */
  .confirm { max-width: 400px; text-align: center; }
  .confirm p { color: var(--text-sub); margin: 12px 0 20px; line-height: 1.6; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--blue-700); color: white;
    padding: 12px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(15,58,122,.4);
    opacity: 0; transition: all .3s; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── DB Status ── */
  .db-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .db-dot.ok  { background: #22c55e; }
  .db-dot.ing { background: #f59e0b; animation: blink .7s infinite alternate; }
  .db-dot.err { background: #ef4444; }
  .db-dot.off { background: #d1d5db; }
  @keyframes blink { from{opacity:1} to{opacity:.2} }

  /* ── DB Setup Modal ── */
  .db-modal { max-width: 540px; }
  .db-desc {
    font-size: 13px; color: var(--text-sub); line-height: 1.7;
    background: var(--blue-50); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 20px;
  }
  .db-desc a { color: var(--gc); }
  .cfg-box {
    width: 100%; height: 160px; border: 1.5px solid var(--blue-200);
    border-radius: 10px; padding: 10px 12px; font-size: 11.5px;
    font-family: monospace; background: var(--blue-50); color: var(--text);
    resize: vertical; outline: none;
  }
  .cfg-box:focus { border-color: var(--gc); background: white; }
  .field small {
    display: block; font-size: 11px; color: var(--text-sub);
    margin-top: 5px; line-height: 1.5;
  }
  .section-divider { border: none; border-top: 1.5px solid var(--blue-200); margin: 18px 0; }

  @media (max-width: 640px) {
    .header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .form-grid { grid-template-columns: 1fr; }
    body { padding: 12px; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="title-wrap">
      <div class="title-top">
        <span class="year-badge">2026</span>
        <h1>팬사인회 응모 정리</h1>
      </div>
      <p id="headerSub">그룹을 선택해 팬사인회 내역을 관리하세요</p>
    </div>
    <div class="header-actions">
      <span class="db-dot off" id="dbDot" title="Firebase 연결 상태"></span>
      <button class="btn btn-primary" id="addBtn" onclick="openModal()">＋ 새 응모 추가</button>
    </div>
  </div>

  <!-- Group Navigation -->
  <div class="group-nav" id="groupNav"></div>

  <!-- Status Tabs -->
  <div class="status-nav">
    <button class="status-tab active" id="tab-ongoing" onclick="switchStatus('ongoing')">
      📋 응모중 <span class="cnt-badge" id="cnt-ongoing">0</span>
    </button>
    <button class="status-tab" id="tab-closed" onclick="switchStatus('closed')">
      ✅ 응모마감 <span class="cnt-badge" id="cnt-closed">0</span>
    </button>
  </div>

  <div class="stats-row">
    <div class="stats-group" id="stats-left"></div>
    <div class="stats-sep"></div>
    <div class="stats-group" id="stats-right"></div>
  </div>

  <div class="filter-bar">
    <input type="text" id="search" placeholder="🔍 음반사, 비고 등으로 검색..." oninput="render()">
    <select id="filterType" onchange="render()">
      <option value="">전체 유형</option>
      <option>대면</option><option>영통</option><option>포토</option>
    </select>
    <select id="sortBy" onchange="render()">
      <option value="date">팬사인회 날짜순</option>
      <option value="apply">응모기간순</option>
      <option value="announce">당첨자발표순</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <colgroup>
        <col style="width:72px">   <!-- 유형 -->
        <col style="width:56px">   <!-- 회차 -->
        <col style="width:130px">  <!-- 음반사 -->
        <col style="width:110px">  <!-- 응모기간 -->
        <col style="width:90px">   <!-- 당첨자발표 -->
        <col style="width:80px">   <!-- 당첨인원 -->
        <col style="width:80px">   <!-- 관람인원 -->
        <col style="width:96px">   <!-- 팬사인회 날짜 -->
        <col style="width:68px">   <!-- 요일 -->
        <col style="width:90px">   <!-- 시간 -->
        <col style="width:160px">  <!-- 비고 -->
        <col style="width:110px">  <!-- 관리 -->
      </colgroup>
      <thead>
        <tr>
          <th>유형</th><th>회차</th><th>음반사</th>
          <th>응모기간</th><th>당첨자발표</th>
          <th>당첨인원</th><th>관람인원</th>
          <th>팬사인회 날짜</th><th>요일</th><th>시간</th>
          <th>비고</th><th>관리</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- ─── 응모 추가/수정 Modal ─── -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modalTitle">＋ 새 응모 추가</h2>
    <div class="form-grid">
      <div class="field">
        <label>유형 *</label>
        <select id="f_type">
          <option>대면</option><option>영통</option><option>포토</option>
        </select>
      </div>
      <div class="field">
        <label>회차</label>
        <input type="text" id="f_round" placeholder="예: 1차">
      </div>
      <div class="field full">
        <label>음반사 *</label>
        <input type="text" id="f_label" placeholder="예: 위버스샵">
      </div>
      <div class="field">
        <label>응모기간</label>
        <input type="text" id="f_apply" placeholder="예: 4/15~4/17">
      </div>
      <div class="field">
        <label>당첨자발표</label>
        <input type="text" id="f_announce" placeholder="예: 4/18">
      </div>
      <div class="field">
        <label>당첨인원</label>
        <input type="text" id="f_winners" placeholder="예: 50">
      </div>
      <div class="field">
        <label>관람인원</label>
        <input type="text" id="f_viewers" placeholder="예: 50">
      </div>
      <div class="field">
        <label>팬사인회 날짜</label>
        <input type="text" id="f_date" placeholder="예: 4/23">
      </div>
      <div class="field">
        <label>요일</label>
        <select id="f_day">
          <option value="">선택</option>
          <option>월요일</option><option>화요일</option><option>수요일</option>
          <option>목요일</option><option>금요일</option><option>토요일</option><option>일요일</option>
        </select>
      </div>
      <div class="field">
        <label>시간</label>
        <input type="text" id="f_time" placeholder="예: 오후 7:00">
      </div>
      <div class="field full">
        <label>비고</label>
        <textarea id="f_note" placeholder="개인영통 / 단체영통 / 미공포 / 앨범 버전 다름 등"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveItem()">💾 저장</button>
    </div>
  </div>
</div>

<!-- ─── 그룹 만들기 / 수정 Modal ─── -->
<div class="modal-bg" id="groupModal">
  <div class="modal" style="max-width:440px">
    <h2 id="groupModalTitle">새 그룹 만들기</h2>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="field">
        <label>그룹 이름 *</label>
        <input type="text" id="g_name" placeholder="예: BTS, 세븐틴, aespa ...">
      </div>
      <div class="field">
        <label>대표 색상</label>
        <div class="color-section" id="colorSection"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeGroupModal()">취소</button>
      <button class="btn btn-primary" id="groupSaveBtn" onclick="saveGroup()">만들기</button>
    </div>
  </div>
</div>

<!-- ─── 비고 전체보기 ─── -->
<div class="modal-bg" id="noteModal">
  <div class="modal note-modal">
    <h2>📝 비고</h2>
    <div class="note-body" id="noteBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('noteModal').classList.remove('active')">닫기</button>
    </div>
  </div>
</div>

<!-- ─── 항목 삭제 확인 ─── -->
<div class="modal-bg" id="confirmModal">
  <div class="modal confirm">
    <h2>🗑️ 삭제 확인</h2>
    <p>이 응모 기록을 삭제할까요?<br>삭제하면 되돌릴 수 없어요.</p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn btn-ghost" onclick="closeConfirm()">취소</button>
      <button class="btn btn-danger" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- ─── 그룹 삭제 확인 ─── -->

<script>
/* ══════════════════════════════════════════

const GROUPS_KEY = 'fansign_groups_v2';
const OLD_KEY    = 'fansign_apply_2026_v1';   // migrate old data

const PALETTE = [

  { type:'포토', round:'2차', label:'위버스',      apply:'4/10~4/15', announce:'4/18', winners:'멤버별 50', viewers:'', date:'6/5',  day:'금요일', time:'오후 9:00',  note:'' },
  { type:'대면', round:'',    label:'뮤직아트',    apply:'4/14~4/16', announce:'4/17', winners:'50',      viewers:'', date:'4/22', day:'수요일', time:'오후 8:30',  note:'' },

  { type:'대면', round:'', label:'블루드림미디어', apply:'4/17~4/23', announce:'4/28', winners:'50',      viewers:'', date:'5/16', day:'토요일', time:'오후 6:30', note:'' },
];

const SEED_TXT = [
  { type:'영통', round:'',    label:'위버스샵',      apply:'3/3~4/2',   announce:'4/13', winners:'50',      viewers:'',   date:'4/20', day:'월요일', time:'오후 6:00',  note:'단체영통' },
  { type:'대면', round:'',    label:'위버스샵',      apply:'3/3~4/2',   announce:'4/13', winners:'50',      viewers:'',   date:'4/20', day:'월요일', time:'오후 8:00',  note:'' },
  { type:'대면', round:'',    label:'블루드림미디어', apply:'4/3~4/12',  announce:'4/13', winners:'50',      viewers:'',   date:'4/15', day:'수요일', time:'오후 7:00',  note:'' },
  { type:'대면', round:'',    label:'뮤직코리아',    apply:'4/13~4/15', announce:'4/16', winners:'50',      viewers:'50', date:'4/21', day:'화요일', time:'오후 6:00',  note:'' },
  { type:'포토', round:'1차', label:'위드뮤',       apply:'4/14~4/16', announce:'4/17', winners:'20',      viewers:'',   date:'4/22', day:'수요일', time:'오후 7:30',  note:'' },
  { type:'대면', round:'',    label:'위드뮤',       apply:'4/14~4/16', announce:'4/17', winners:'50',      viewers:'',   date:'4/22', day:'수요일', time:'오후 9:00',  note:'' },
  { type:'대면', round:'',    label:'뮤직아트',     apply:'4/15~4/17', announce:'4/18', winners:'50',      viewers:'50', date:'4/23', day:'목요일', time:'오후 8:30',  note:'' },
  { type:'포토', round:'2차', label:'뮤직플랜트',   apply:'4/16~4/18', announce:'4/19', winners:'20',      viewers:'',   date:'4/24', day:'금요일', time:'오후 8:00',  note:'' },
  { type:'대면', round:'',    label:'뮤직플랜트',   apply:'4/16~4/18', announce:'4/19', winners:'50',      viewers:'',   date:'4/24', day:'금요일', time:'오후 9:00',  note:'' },
  { type:'포토', round:'3차', label:'케이타운포유',  apply:'4/17~4/19', announce:'4/20', winners:'20',      viewers:'',   date:'4/25', day:'토요일', time:'오후 6:00',  note:'' },
  { type:'대면', round:'',    label:'케이타운포유',  apply:'4/17~4/19', announce:'4/20', winners:'50',      viewers:'',   date:'4/25', day:'토요일', time:'오후 7:30',  note:'' },
  { type:'영통', round:'1차', label:'NY MUSIC',    apply:'4/15~4/27', announce:'4/30', winners:'멤버별 30', viewers:'',   date:'5/19', day:'화요일', time:'오후 8:30',  note:'개인영통 / 미공포 O / 앨범 버전 다름' },
];

/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
let groups        = [];
let allItems      = {};   // { groupId: [...items] }
let currentGid    = null;
let currentStatus = 'ongoing';
let editingId     = null;
let deletingId    = null;
let deletingGid   = null;
let editingGid    = null;   // group being edited
let selColor      = PALETTE[0];

/* ══════════════════════════════════════════
   Helpers
══════════════════════════════════════════ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const esc = s => s == null ? '' :
  String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function parseDate(s) {
  if (!s) return '9999-99-99';
  const m = s.match(/(\d{1,2})\/(\d{1,2})/);
  return m ? `2026-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}` : '9999-99-99';
}

function applyEndDate(s) {
  if (!s) return null;
  const part = s.includes('~') ? s.split('~').pop().trim() : s;
  const m = part.match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return null;
  return new Date(2026, +m[1]-1, +m[2]);
}

function isOngoing(item) {
  const end = applyEndDate(item.apply);
  if (!end) return true;
  const today = new Date(); today.setHours(0,0,0,0);
  return end >= today;
}

/* ══════════════════════════════════════════
   Load / Save
══════════════════════════════════════════ */
function loadAll() {
  // Migrate old single-group data into TXT slot
  const oldRaw = localStorage.getItem(OLD_KEY);

  try {
    const raw = localStorage.getItem(GROUPS_KEY);
    groups = raw ? JSON.parse(raw) : structuredClone(DEFAULT_GROUPS);
  } catch { groups = structuredClone(DEFAULT_GROUPS); }
  if (!groups.length) groups = structuredClone(DEFAULT_GROUPS);

  groups.forEach(g => {
    try {
      const raw = localStorage.getItem(g.sk);
      const parsed = raw ? JSON.parse(raw) : null;
      const hasData = Array.isArray(parsed) && parsed.length > 0;

      if (hasData) {
        allItems[g.id] = parsed;
      } else {
        // 저장된 데이터가 없거나 빈 배열이면 시드 데이터로 초기화
        if (g.id === 'txt') {
          const migrated = oldRaw ? JSON.parse(oldRaw) : null;
          allItems[g.id] = Array.isArray(migrated) && migrated.length
            ? migrated.map(x => ({ id: x.id||uid(), ...x }))
            : SEED_TXT.map(x => ({ id: uid(), ...x }));
        } else if (g.id === 'andteam') {
          allItems[g.id] = SEED_ANDTEAM.map(x => ({ id: uid(), ...x }));
        } else if (g.id === 'tws') {
          allItems[g.id] = SEED_TWS.map(x => ({ id: uid(), ...x }));
        } else {
          allItems[g.id] = [];
        }
        localStorage.setItem(g.sk, JSON.stringify(allItems[g.id]));
      }
    } catch {
      const seeds = { txt: SEED_TXT, andteam: SEED_ANDTEAM, tws: SEED_TWS };
      allItems[g.id] = (seeds[g.id] || []).map(x => ({ id: uid(), ...x }));
    }
  });

  saveGroups();
  const savedGid = localStorage.getItem('fansign_cur_group');
  currentGid = (savedGid && groups.find(g => g.id === savedGid)) ? savedGid : groups[0].id;
}

function saveGroups() { localStorage.setItem(GROUPS_KEY, JSON.stringify(groups)); }
function saveItems(gid) {
  const g = groups.find(x => x.id === gid);
  if (g) localStorage.setItem(g.sk, JSON.stringify(allItems[gid] || []));
}
const curItems = () => allItems[currentGid] || [];
const curGroup = () => groups.find(g => g.id === currentGid);

/* ══════════════════════════════════════════
   Theme
══════════════════════════════════════════ */
function applyTheme(color) {
  document.documentElement.style.setProperty('--gc', color);
  const activeTab = document.querySelector('.status-tab.active');
  if (activeTab) { activeTab.style.background = color; activeTab.style.boxShadow = `0 2px 10px ${color}55`; }
  const hdr = document.querySelector('.header');
  if (hdr) hdr.style.borderLeftColor = color;
  const badge = document.querySelector('.year-badge');
  if (badge) badge.style.background = color;
}

/* ══════════════════════════════════════════
   Group Navigation
══════════════════════════════════════════ */
function renderGroupNav() {
  const nav = document.getElementById('groupNav');
  nav.innerHTML = groups.map(g => {
    const active = g.id === currentGid;
    const canDel = groups.length > 1;
    return `<button class="group-tab${active?' active':''}"
      style="${active ? `background:${g.color};border-color:${g.color};` : `border-color:${g.color}30;`}"
      onclick="switchGroup('${g.id}')">
      <span class="group-dot" style="background:${active?'rgba(255,255,255,.8)':g.color}"></span>
      ${esc(g.name)}
      <span class="group-actions">
        <button class="group-icon-btn" title="이름/색상 수정"
          onclick="event.stopPropagation();openEditGroup('${g.id}')">✎</button>
        ${canDel
          ? `<button class="group-icon-btn" title="${esc(g.name)} 삭제"
               onclick="event.stopPropagation();askDelGroup('${g.id}')">×</button>`
          : ''}
      </span>
    </button>`;
  }).join('') +
  `<button class="group-add-btn" onclick="openGroupModal()">＋ 새 그룹</button>`;
}

function switchGroup(gid) {
  currentGid = gid;
  localStorage.setItem('fansign_cur_group', gid);
  const g = curGroup();
  applyTheme(g.color);
  document.getElementById('headerSub').textContent = `${g.name} 팬사인회 내역`;
  renderGroupNav();
  render();
}

/* ══════════════════════════════════════════
   Status Tabs
══════════════════════════════════════════ */
function switchStatus(s) {
  currentStatus = s;
  const g = curGroup();
  ['ongoing','closed'].forEach(k => {
    const el = document.getElementById(`tab-${k}`);
    const active = k === s;
    el.classList.toggle('active', active);
    el.style.background = active ? g.color : '';
    el.style.boxShadow  = active ? `0 2px 10px ${g.color}55` : '';
  });
  render();
}

/* ══════════════════════════════════════════
   Render
══════════════════════════════════════════ */
function render() {
  const q  = document.getElementById('search').value.trim().toLowerCase();
  const ft = document.getElementById('filterType').value;
  const sb = document.getElementById('sortBy').value;
  const items = curItems();

  // Badge counts
  const onC = items.filter(i =>  isOngoing(i)).length;
  const clC = items.filter(i => !isOngoing(i)).length;
  document.getElementById('cnt-ongoing').textContent = onC;
  document.getElementById('cnt-closed').textContent  = clC;

  // Filter by status
  let list = items.filter(i => currentStatus === 'ongoing' ? isOngoing(i) : !isOngoing(i));
  if (ft) list = list.filter(i => i.type === ft);
  if (q)  list = list.filter(i =>
    (i.label||'').toLowerCase().includes(q) ||
    (i.note||'').toLowerCase().includes(q)  ||
    (i.round||'').toLowerCase().includes(q)
  );

  // Sort
  list.sort((a,b) => {
    if (sb==='apply')    return parseDate((a.apply||'').split('~')[0]).localeCompare(parseDate((b.apply||'').split('~')[0]));
    if (sb==='announce') return parseDate(a.announce).localeCompare(parseDate(b.announce));
    return parseDate(a.date).localeCompare(parseDate(b.date));
  });

  const tbody = document.getElementById('tbody');
  if (!list.length) {
    const msg = currentStatus === 'ongoing'
      ? '현재 응모중인 항목이 없어요'
      : '응모가 마감된 항목이 없어요';
    tbody.innerHTML = `<tr><td colspan="12"><div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      <div>${msg}</div>
    </div></td></tr>`;
  } else {
    tbody.innerHTML = list.map(i => `
      <tr>
        <td><span class="tag tag-${i.type}">${esc(i.type)}</span></td>
        <td>${esc(i.round)}</td>
        <td><strong>${esc(i.label)}</strong></td>
        <td>${esc(i.apply)}</td>
        <td>${esc(i.announce)}</td>
        <td>${esc(i.winners)}</td>
        <td>${esc(i.viewers)}</td>
        <td>${esc(i.date)}</td>
        <td>${esc(i.day)}</td>
        <td>${esc(i.time)}</td>
        <td class="note${i.note ? ' has-content' : ''}"
          ${i.note ? `onclick="showNote('${i.id}')" title="클릭해서 전체 보기"` : ''}>
          ${esc(i.note)}
        </td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-ghost btn-sm" onclick="openModal('${i.id}')">수정</button>
            <button class="btn btn-danger btn-sm" onclick="askDelete('${i.id}')">삭제</button>
          </div>
        </td>
      </tr>`).join('');
  }

  renderStats(items);
}

function renderStats(items) {
  const g = curGroup();
  const color = g?.color || '#2680eb';
  const cnt = t => items.filter(i => i.type === t).length;
  const card = (l,v,c) => `<div class="stat-card" style="border-top-color:${c}">
    <div class="lbl">${l}</div><div class="val">${v}</div></div>`;

  document.getElementById('stats-left').innerHTML = [
    card('전체',   items.length,                    color),
    card('응모중', items.filter(isOngoing).length,  '#22c55e'),
    card('응모마감', items.filter(i=>!isOngoing(i)).length, '#94a3b8'),
  ].join('');

  document.getElementById('stats-right').innerHTML = [
    card('대면', cnt('대면'), 'var(--blue-500)'),
    card('영통', cnt('영통'), '#e89bb8'),
    card('포토', cnt('포토'), '#7cbc9f'),
  ].join('');
}

/* ══════════════════════════════════════════
   Add / Edit Item Modal
══════════════════════════════════════════ */
function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '✏️ 응모 수정' : '＋ 새 응모 추가';
  const it = id ? curItems().find(x => x.id === id) : null;
  const set = (k,v) => document.getElementById(k).value = v || '';
  set('f_type',     it?.type || '대면');
  set('f_round',    it?.round);
  set('f_label',    it?.label);
  set('f_apply',    it?.apply);
  set('f_announce', it?.announce);
  set('f_winners',  it?.winners);
  set('f_viewers',  it?.viewers);
  set('f_date',     it?.date);
  set('f_day',      it?.day);
  set('f_time',     it?.time);
  set('f_note',     it?.note);
  document.getElementById('modal').classList.add('active');
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editingId = null;
}

function saveItem() {
  const get = k => document.getElementById(k).value.trim();
  const label = get('f_label');
  if (!label) { showToast('음반사를 입력해주세요'); return; }
  const data = {
    type:get('f_type'), round:get('f_round'), label,
    apply:get('f_apply'), announce:get('f_announce'),
    winners:get('f_winners'), viewers:get('f_viewers'),
    date:get('f_date'), day:get('f_day'), time:get('f_time'), note:get('f_note'),
  };
  const items = allItems[currentGid] || [];
  if (editingId) {
    const idx = items.findIndex(x => x.id === editingId);
    items[idx] = { ...items[idx], ...data };
    showToast('수정되었어요 ✨');
  } else {
    items.push({ id:uid(), ...data });
    showToast('추가되었어요 💙');
  }
  allItems[currentGid] = items;
  saveItems(currentGid);
  closeModal();
  render();
  scheduleAutoSave();
}

/* ══════════════════════════════════════════
   Delete Item
══════════════════════════════════════════ */
function askDelete(id)  { deletingId = id; document.getElementById('confirmModal').classList.add('active'); }
function closeConfirm() { document.getElementById('confirmModal').classList.remove('active'); deletingId = null; }
function confirmDelete() {
  allItems[currentGid] = (allItems[currentGid]||[]).filter(x => x.id !== deletingId);
  saveItems(currentGid);
  closeConfirm();
  render();
  showToast('삭제되었어요');
  scheduleAutoSave();
}

/* ══════════════════════════════════════════
   Note Popup
══════════════════════════════════════════ */
function showNote(id) {
  const item = curItems().find(x => x.id === id);
  if (!item || !item.note) return;
  document.getElementById('noteBody').textContent = item.note;
  document.getElementById('noteModal').classList.add('active');
}

/* ══════════════════════════════════════════
   Group Create
══════════════════════════════════════════ */
function openGroupModal() {
  editingGid = null;
  document.getElementById('g_name').value = '';
  document.getElementById('groupModalTitle').textContent = '새 그룹 만들기';
  document.getElementById('groupSaveBtn').textContent = '만들기';
  selColor = PALETTE[0];
  renderSwatches();
  document.getElementById('groupModal').classList.add('active');
  setTimeout(() => document.getElementById('g_name').focus(), 80);
}

function openEditGroup(gid) {
  const g = groups.find(x => x.id === gid);
  if (!g) return;
  editingGid = gid;
  document.getElementById('g_name').value = g.name;
  document.getElementById('groupModalTitle').textContent = '그룹 수정';
  document.getElementById('groupSaveBtn').textContent = '저장';
  selColor = g.color;
  renderSwatches();
  document.getElementById('groupModal').classList.add('active');
  setTimeout(() => document.getElementById('g_name').focus(), 80);
}

function closeGroupModal() {
  document.getElementById('groupModal').classList.remove('active');
  editingGid = null;
}

const PALETTE_SECTIONS = [
  { label: '비비드',        colors: ['#2680eb','#7c3aed','#e05c7e','#059669','#d97706','#dc2626','#0891b2','#be185d','#4f46e5','#0369a1'] },
  { label: '파스텔',        colors: ['#93c5fd','#c4b5fd','#f9a8d4','#86efac','#fde68a','#fca5a5','#67e8f9','#f0abfc','#a5b4fc','#6ee7b7'] },
  { label: '무채색 · 어스', colors: ['#94a3b8','#64748b','#475569','#334155','#1e293b','#a8a29e','#78716c','#57534e','#d6d3d1','#e7e5e4'] },
];

function renderSwatches() {
  document.getElementById('colorSection').innerHTML = PALETTE_SECTIONS.map(sec =>
    `<div class="color-section-label">${sec.label}</div>
     <div class="color-row">${
       sec.colors.map(c =>
         `<div class="cswatch${c===selColor?' sel':''}" style="background:${c}"
           onclick="pickColor('${c}')"></div>`
       ).join('')
     }</div>`
  ).join('');
}
function pickColor(c) { selColor = c; renderSwatches(); }

function saveGroup() {
  const name = document.getElementById('g_name').value.trim();
  if (!name) { showToast('그룹 이름을 입력해주세요'); return; }

  if (editingGid) {
    // Edit mode
    const g = groups.find(x => x.id === editingGid);
    if (!g) return;
    const oldName = g.name;
    g.name  = name;
    g.color = selColor;
    saveGroups();
    closeGroupModal();
    // If editing the active group, refresh theme + subtitle
    if (editingGid === currentGid) {
      applyTheme(selColor);
      document.getElementById('headerSub').textContent = `${name} 팬사인회 내역`;
    }
    renderGroupNav();
    render();
    showToast(`그룹이 수정되었어요 ✨`);
    scheduleAutoSave();
  } else {
    // Create mode
    const rawId = name.toLowerCase().replace(/[^a-z0-9]/g,'') || 'g';
    const id    = rawId + '_' + Date.now().toString(36);
    const g     = { id, name, color: selColor, sk: 'fansign_items_' + id };
    groups.push(g);
    allItems[id] = [];
    saveGroups();
    saveItems(id);
    closeGroupModal();
    switchGroup(id);
    showToast(`${name} 그룹이 만들어졌어요 🎉`);
    scheduleAutoSave();
  }
}

/* ══════════════════════════════════════════
   Group Delete
══════════════════════════════════════════ */
function askDelGroup(gid) {
  const g = groups.find(x => x.id === gid);
  if (!g) return;
  deletingGid = gid;
  document.getElementById('cgText').textContent =
    `"${g.name}" 그룹의 모든 데이터가 삭제됩니다.\n삭제하면 되돌릴 수 없어요.`;
  document.getElementById('confirmGroupModal').classList.add('active');
}
function closeGroupConfirm() {
  document.getElementById('confirmGroupModal').classList.remove('active');
  deletingGid = null;
}
function confirmDeleteGroup() {
  const g = groups.find(x => x.id === deletingGid);
  if (g) localStorage.removeItem(g.sk);
  groups = groups.filter(x => x.id !== deletingGid);
  delete allItems[deletingGid];
  if (!groups.length) {
    const ng = { id:'default', name:'기본', color:'#2680eb', sk:'fansign_items_default' };
    groups.push(ng);
    allItems['default'] = [];
  }
  saveGroups();
  closeGroupConfirm();
  switchGroup(currentGid === deletingGid ? groups[0].id : currentGid);
  showToast('그룹이 삭제되었어요');
  scheduleAutoSave();
}

/* ══════════════════════════════════════════
   Firebase / Firestore Sync
══════════════════════════════════════════ */
const LOCAL_TS_KEY = 'fansign_local_ts';    // 마지막 Firebase 저장 시각

// ── 하드코딩된 Firebase 설정 ──
const FIREBASE_CFG = {
  apiKey:            "AIzaSyC35oJkOl9PGpogNTULvUpYBdGElIJsVmQ",
  authDomain:        "apply-3bb43.firebaseapp.com",
  projectId:         "apply-3bb43",
  storageBucket:     "apply-3bb43.firebasestorage.app",
  messagingSenderId: "1069187478337",
  appId:             "1:1069187478337:web:da3700f3783889458227c0",
  measurementId:     "G-455ZN15C0T"
};
const DB_KEY = 'youngchun2026';   // 개인 네임스페이스 키

let db            = null;   // firestore instance
let autoSaveTimer = null;

function setDot(s) {
  const d = document.getElementById('dbDot');
  if (d) d.className = `db-dot ${s}`;
}

function loadDbConfig() {
  try {
    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CFG);
    db = firebase.firestore(app);
    setDot('ok');
    pullFromFirestore(true);   // 시작 시 자동 불러오기
  } catch (e) {
    setDot('err');
    console.error('Firebase 초기화 실패:', e);
  }
}

function scheduleAutoSave() {
  if (!db) return;
  clearTimeout(autoSaveTimer);
  setDot('ing');
  // 딜레이 없이 즉시 저장
  pushToFirestore(true);
}

async function pushToFirestore(silent = false) {
  if (!db) return;
  setDot('ing');
  try {
    const ts = new Date().toISOString();
    localStorage.setItem(LOCAL_TS_KEY, ts);  // 저장 시작 전에 먼저 찍기 (새로고침 보호)
    await db.collection('fansign').doc(DB_KEY).set({
      groups,
      items: allItems,
      updatedAt: ts
    });
    setDot('ok');
    if (!silent) showToast('저장됐어요 ✓');
  } catch (e) {
    setDot('err');
    if (!silent) showToast('저장 실패: ' + (e.code || e.message));
  }
}

async function pullFromFirestore(silent = false) {
  if (!db) return;
  setDot('ing');
  try {
    const snap = await db.collection('fansign').doc(DB_KEY).get();

    // Firebase에 데이터 없으면 로컬 → Firebase 올리기
    if (!snap.exists) {
      await pushToFirestore(true);
      return;
    }

    const data       = snap.data();
    const localTs    = localStorage.getItem(LOCAL_TS_KEY) || '0000';
    const firebaseTs = data.updatedAt || '0000';

    if (firebaseTs > localTs) {
      // Firebase가 더 최신 (다른 기기에서 수정했을 때) → 불러오기
      if (data.groups && data.items) {
        groups = data.groups;
        allItems = {};
        groups.forEach(g => {
          allItems[g.id] = (data.items[g.id] || []).map(x => ({ id: x.id || uid(), ...x }));
          saveItems(g.id);
        });
        saveGroups();
        localStorage.setItem(LOCAL_TS_KEY, firebaseTs);
        switchGroup(groups[0].id);
        setDot('ok');
        if (!silent) showToast('최신 데이터 불러왔어요 ✓');
      }
    } else {
      // 로컬이 같거나 최신 → 로컬 데이터를 Firebase에 동기화
      await pushToFirestore(true);
    }
  } catch (e) {
    setDot('err');
    if (!silent) showToast('불러오기 실패: ' + (e.code || e.message));
  }
}

/* ══════════════════════════════════════════
   Export / Import
══════════════════════════════════════════ */
function exportJSON() {
  const data = { version:2, groups, items: allItems, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `팬사인회응모_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('백업 파일을 저장했어요 📥');
}

function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (Array.isArray(data)) {
        // Legacy: import into current group
        allItems[currentGid] = data.map(x => ({ id:x.id||uid(), ...x }));
        saveItems(currentGid);
        render();
        showToast('현재 그룹에 데이터를 불러왔어요');
      } else if (data.groups && data.items) {
        groups = data.groups;
        allItems = {};
        groups.forEach(g => {
          allItems[g.id] = (data.items[g.id]||[]).map(x=>({id:x.id||uid(),...x}));
          saveItems(g.id);
        });
        saveGroups();
        switchGroup(groups[0].id);
        showToast('전체 데이터를 불러왔어요 ✨');
      } else {
        showToast('올바른 JSON 파일이 아니에요');
      }
    } catch { showToast('올바른 JSON 파일이 아니에요'); }
  };
  r.readAsText(file);
  e.target.value = '';
}

/* ══════════════════════════════════════════
   Toast
══════════════════════════════════════════ */
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ══════════════════════════════════════════
   Event Delegation
══════════════════════════════════════════ */
document.querySelectorAll('.modal-bg').forEach(bg => {

      bg.classList.remove('active');

document.addEventListener('keydown', e => {

    document.querySelectorAll('.modal-bg.active').forEach(m => m.classList.remove('active'));
